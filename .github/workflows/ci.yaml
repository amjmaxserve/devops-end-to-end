name: Farm Inventory CI

on:
push:
branches:
- main
- feature/inventory-api

pull_request:
branches:
- main

jobs:

build:


runs-on: ubuntu-latest

steps:

  - name: Checkout Source
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Build Docker Image
    run: |
      docker build \
        -t farm-inventory:v1 \
        -f docker/Dockerfile .

  - name: Trivy Scan
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: farm-inventory:v1
      format: table
      severity: HIGH,CRITICAL

  - name: Run Container
    run: |
      docker run -d \
        --name farm-test \
        -p 8001:8000 \
        farm-inventory:v1

  - name: Health Check
    run: |
      sleep 10
      curl http://192.168.29.5:8001/

  - name: Cleanup
    if: always()
    run: |
      docker rm -f farm-test || true

