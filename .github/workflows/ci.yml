
name: Farm Inventory CI

on:
  push:
    branches:
      - main
      - feature/inventory-api
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Debug secrets
        run: |
          echo "DOCKERHUB_USERNAME exists: ${{ secrets.DOCKERHUB_USERNAME != '' }}"
          echo "DOCKERHUB_TOKEN exists: ${{ secrets.DOCKERHUB_TOKEN != '' }}"

      - name: Login to docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify Runner
        run: |
          hostname
          whoami
          pwd
          docker --version

      - name: Build Docker Image
        run: |
          docker build -t arjunmj/farm-inventory:latest \
          -t arjunmj/farm-inventory:${{ github.run_number}} \
          -f docker/Dockerfile .

      - name: Verify Docker Image
        run: |
          docker images | grep arjunmj/farm-inventory
      
      - name: trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arjunmj/farm-inventory:latest
          format: 'table'
          serverity: 'HIGH,CRITICAL'
          exit-code: '0'
      
      

      - name: Remove Existing Container
        run: |
          docker rm -f farm-test || true
      
      - name: push to docker hub
        run: |
          docker push arjunmj/farm-inventory:latest
          docker push arjunmj/farm-inventory:${{ github.run_number}}
      

      - name: Run Application Container
        run: |
          docker run -d \
            --name farm-test \
            -p 8001:8000 \
            arjunmj/farm-inventory:latest

      - name: Container Debug
        run: |
          docker ps -a
          docker logs farm-test || true

      - name: Health Check
        run: |
          sleep 10
          curl http://localhost:8001/

      - name: Cleanup
        if: always()
        run: |
          docker rm -f farm-test || true



