apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: farm-inventory-hpa
  namespace: farm

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: farm-inventory

  minReplicas: 2
  maxReplicas: 5

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0

      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

    scaleDown:
      stabilizationWindowSeconds: 60

      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70