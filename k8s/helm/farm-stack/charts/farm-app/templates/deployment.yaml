apiVersion: apps/v1
kind: Deployment

metadata:
  name: farm-inventory

spec:
  {{- if not .Values.hpa.enabled}}
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.deploymentStrategy.type }}

    rollingUpdate:
      maxSurge: {{ .Values.deploymentStrategy.rollingUpdate.maxSurge}}
      maxUnavaliable: {{ .Values.deploymentStrategy.rollingUpdate.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      app: farm-inventory

  template:
    metadata:
      labels:
        app: farm-inventory

    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Values.database.host }} {{ .Values.database.port }}
              do
                echo "waiting for PostgresDB..."
                sleep 5
              done
      containers:
        - name: farm-inventory

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8000
          
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: APP_NAME

            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: ENVIRONMENT

            - name: COMPANY
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: COMPANY

            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: farm-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: farm-secret
                  key: DB_PASSWORD

          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: {{ .Values.probes.startup.port }}

            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.probes.readiness.port }}

            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: {{ .Values.probes.liveness.port }}

            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}

          resources:
            requests:
              memory: {{ .Values.resources.requests.memory }}
              cpu: {{ .Values.resources.requests.cpu }}

            limits:
              memory: {{ .Values.resources.limits.memory }}
              cpu: {{ .Values.resources.limits.cpu }}