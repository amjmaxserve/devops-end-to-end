apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-exporter

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres-exporter

  template:
    metadata:
      labels:
        app: postgres-exporter

    spec:
      containers:

      - name: postgres-exporter

        image: prometheuscommunity/postgres-exporter:v0.17.1

        ports:
          - containerPort: 9187

        env:
          - name: DATA_SOURCE_NAME
            value: "postgresql://postgres:postgres123@postgres:5432/farmdb?sslmode=disable"