  maxUnavailable: 1

  selector:
    matchLabels:
      app: farm-inventory
---
# Source: farm-stack/charts/farm-app/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount

metadata:
  name: farm-service-account
---
# Source: farm-stack/charts/farm-app/templates/secret.yaml
apiVersion: v1
