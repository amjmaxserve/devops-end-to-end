---
# Source: farm-stack/charts/postgres/templates/secret.yaml
apiVersion: v1
kind: Secret

metadata:
  name: postgres-secret

type: Opaque

data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXMxMjM=
  POSTGRES_DB: ZmFybWRi
---
# Source: farm-stack/charts/farm-app/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap

metadata:
  name: farm-inventory-config

data:
  APP_NAME: "Farm Inventory"
