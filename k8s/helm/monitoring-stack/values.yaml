kube-prometheus-stack:

  grafana:

    adminPassword: admin123

    service:
      type: NodePort

    ingress:
      enabled: true
      ingressClassName: traefik

      hosts:
        - grafana.local

      path: /
      pathType: Prefix

  prometheus:

    prometheusSpec:
      retention: 7d

    ingress:
      enabled: true

      ingressClassName: traefik
      hosts:
        - prometheus.local
      paths:
        - /
      pathType: Prefix

  alertmanager:
    enabled: true

    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - alertmanager.local
      paths:
        - /
      pathType: Prefix

    config:
      global:
        smtp_smarthost: "smtp.gmail.com:587"
        smtp_from: "amjmaxserve@gmail.com"
        smtp_auth_username: "amjmaxserve@gmail.com"
        smtp_auth_password: "pzvnnoeyejvdzbly"

      route:
        group_by:
          - alertname
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: email-notification

      receivers:
        - name: email-notification
          email_configs:
            - to: "arjunmjbhr@gmail.com"
              send_resolved: true

        - name: "null"
    
    
  
