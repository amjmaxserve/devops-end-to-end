# Source: farm-stack/charts/farm-app/templates/postgres-alerts.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: postgres-alerts
  labels:
    release: monitoring-stack

spec:
  groups:
    - name: postgres-alerts

      rules:

        - alert: PostgreSQLDown
          expr: pg_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: PostgreSQL Down
            description: PostgreSQL exporter cannot connect to database.

        - alert: PostgreSQLHighConnections
          expr: pg_stat_database_numbackends > 50
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: High PostgreSQL Connections
            description: Database connections exceeded threshold.

        - alert: PostgreSQLDeadlocks
          expr: increase(pg_stat_database_deadlocks[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: PostgreSQL Deadlock Detected
            description: One or more deadlocks occurred.
---
# Source: farm-stack/charts/farm-app/templates/prometheusrule.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule

metadata:
  name: farm-inventory-alerts
  namespace: farm-stack

  labels:
    release: monitoring-stack

spec:
  groups:

    - name: farm-inventory-alerts

      rules:

        - alert: FarmInventoryAPIDown

          expr: |
            sum(
              up{
                namespace= "farm-stack",
                job= "farm-inventory-service"
              }
            ) < 1
                

          for: 1m

          labels:
            severity: critical

          annotations:
            summary: "Farm Inventory API Down"
            description: "Farm Inventory application is unreachable."

        - alert: FarmInventoryHighResponseTime

          expr: |
            histogram_quantile(
              0.95,
              sum(
                rate(
                  farm_inventory_request_duration_seconds_bucket[5m]
                )
              ) by (le)
            ) > 1

          for: 2m

          labels:
            severity: warning

          annotations:
            summary: "High API Response Time"
            description: "95th percentile response time exceeds 1 second."

        - alert: FarmInventoryPodRestarting

          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="farm-stack"
              }[10m]
            ) > 3

          for: 5m

          labels:
            severity: critical

          annotations:
            summary: "Pod Restarting Frequently"
            description: "Farm Inventory pod restarted more than 3 times."
---
# Source: farm-stack/charts/farm-app/templates/rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout

metadata:
  name: farm-inventory

spec:
  strategy:
    canary:
      maxSurge: 1
      maxUnavailable: 0
      steps:
        - setWeight: 20
        - pause:
            duration: 30s
        - setWeight: 50
        - pause:
            duration: 30s
        - setWeight: 100


  selector:
    matchLabels:
      app: farm-inventory

  template:
    metadata:
      labels:
        app: farm-inventory

    spec:
      serviceAccountName: farm-service-account

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432
              do
                echo "waiting for PostgresDB..."
                sleep 5
              done
      containers:
        - name: farm-inventory

          image: "arjunmj/farm-stack:36"

          imagePullPolicy: Always

          ports:
            - containerPort: 8000
          
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: APP_NAME

            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: ENVIRONMENT

            - name: COMPANY
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: COMPANY

            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: farm-inventory-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: farm-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: farm-secret
                  key: DB_PASSWORD

          startupProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12

          readinessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000

            initialDelaySeconds: 15
            periodSeconds: 10

          resources:
            requests:
              memory: 128Mi
              cpu: 100m

            limits:
              memory: 256Mi
              cpu: 500m
