---
# Source: farm-stack/charts/postgres/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:

        - name: postgres

          image: "postgres:17"

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          resources:
            requests:
              memory: 256Mi
              cpu: 100m

            limits:
              memory: 512Mi
              cpu: 500m
        

          readinessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - postgres

            initialDelaySeconds: 10
            periodSeconds: 5
        
          livenessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - postgres

            initialDelaySeconds: 30
            periodSeconds: 10


      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
# Source: farm-stack/charts/postgres/templates/postgres-exporter-deployment.yaml
apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-exporter

spec:
  replicas: 1

